<!DOCTYPE html>
<html>  
    <head>
        <title>Contact</title>
        <style>
            .navbar{
                display: flex;
                justify-content: center;
                gap: 20px;
                font-size: large;
            }

        </style>
    </head>
    <body>
        <div class="navbar">
            <a href="Home.html"><strong>Home</strong></a>
            <a href="Experience.html"><strong></strong>Experience</strong></a>
            <a href="Education.html"><strong>Education</strong></a>
            <a href="Project.html"><strong>Project</strong></a>
            <a href="Contact.html"><strong>Contact</strong></a>
        </div>
        <br>
        <h1>Contact Information</h1>
        <fieldset>
            <legend>Registration</legend>
            <table>
                <tr>
                    <td><label for="name">Name:</label></td>
                    <td><input type="text" id="name" name="name" required></td>
                </tr>
                <tr>
                    <td><label for="email">Email:</label></td>
                    <td><input type="email" id="email" name="email" required></td>
                </tr>
                <tr>
                    <td><label for="password">Password:</label></td>
                    <td><input type="password" id="password" name="password" required></td>
                </tr>
                
                <tr>
                    <td><label for="phone">Phone:</label></td>
                    <td><input type="tel" id="phone" name="phone" required></td>
                </tr>
                <tr>
                    <td><label for="Gender">Gender:</label></td>
                    <td>
                        <input type="radio" id="male" name="gender" value="male" required>
                        <label for="male">Male</label>
                        <input type="radio" id="female" name="gender" value="female" required>
                        <label for="female">Female</label>
                    </td>
                </tr>
                <tr>
                    <td><label for="Country">Country:</label></td>
                    <td>
                        <select id="Country" name="Country" required>
                            <option value="">Select a country</option>
                            <option value="USA">United States</option>
                            <option value="Canada">Canada</option>
                            <option value="UK">United Kingdom</option>
                        </select>
                    </td>
                    <tr>
                        <td><label for="date">Date:</label></td>
                        <td><input type="date" id="date" name="date" required></td>
                    </tr>
                </tr>
                
                <tr>
                    <td><label for="message">Message:</label></td>
                    <td><textarea id="message" name="message" rows="4" cols="50" required></textarea></td>
                </tr>
                <tr>
                    <td>    </td>
                    <td><input type="submit" value="Submit"></td>
                </tr>
            </table>
            
        </fieldset>
        <p>Email: shurocanvas@email.com</p>
    </body>
</html>
