<!DOCTYPE html>
<html>

<head>
  <title>FORM TWO</title>
  <!--<link rel="stylesheet" href="form1.css">-->

</head>


<body>
  <form class="card">
    <div class="card-body">
      <h2 class="h1">Create Your Account</h2>
      <h3 class="joinus">join us in a couple of steps.</h3>

    </div>

    <div class="for">
      <label for="Full-name">Full name</label>
      <input type="text" id="name" name="name" required>
    </div>

    <div class="for">
      <label for="age">Age</label>
      <input type="number" id="age" name="age" required>
    </div>

    <div class="for">
      <label for="dob">Date of birth</label>
      <input type="date" id="dob" name="dob" required>
    </div>

    <div class="for">
      <label for="Email">Email address</label>
      <input type="text" id="email" name="Email" required>
    </div>

    <div class="for">
      <label for="password">PAssword</label>
      <input type="password" id="password" name="password" required>
    </div>

    <div>
      <label for="Contact">Prefferred Contact</label>
      <input type="radio" id="contact" name="Contact" value="Email">Email
      <input type="radio" id="contact" name="Contact" value="Phone">Phone
      <input type="radio" id="contact" name="Contact" value="SMS">SMS
    </div>

    <div class="button">
      <button type="submit">Submit</button>
      <button type="reset">Reset</button>
    </div>















  </form>


</body>

</html>
